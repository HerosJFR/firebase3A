<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<style>
    input{
        margin: 10px;
    }
    fieldset{
        align-items: center;
        text-align: center;
        color: white;

    }
    legend{
        align-items: center;
        text-align: center;
        color: white;
    }
    body{
        background-color: rgb(70, 115, 199);
    }
    input{
        border-radius: 5px;
        border-color: white;
    }
</style>
<body>
    <main>
        <fieldset>
            <legend>Formulario de Cadastro</legend>
            
            cep: <input type="text" name="CEP" id="cep" placeholder="DIGITE O SEU CEP" minlength="10" maxlength="100"><br>
            cpf: <input type="text" name="CPF" id="cpf" placeholder="DIGITE O SEU CPF" minlength="14" maxlength="11"><br>
            email: <input type="text" name="EMAIL" id="email" placeholder="DIGITE O SEU EMAIL"  maxlength="100"><br>
            idade: <input type="text" name="IDADE" id="idade" placeholder="DIGITE O SEU IDADE" minlength="1" maxlength="3"><br>
            nome: <input type="text" name="NOME" id="nome" placeholder="DIGITE O SEU NOME"  maxlength="100"><br>
            senha: <input type="password" name="SENHA" id="senha" placeholder="DIGITE O SEU SENHA" minlength="8" maxlength="40"><br>
            telefone: <input type="text" name="TELEFONE" id="telefone" placeholder="DIGITE O SEU TELEFONE" minlength="11" maxlength="11"><br>
            <input type="submit" value="CADASTRAR"><br>
            
        </fieldset>
    </main>
    <script>
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
        getFirestore,
        collection,
        addDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            const firebaseConfig = {
              apiKey: "AIzaSyCfffba-K-xmsEc2F_nJb2fhgKNwljC0Jc",
              authDomain: "herosjhessy-a4c53.firebaseapp.com",
              projectId: "herosjhessy-a4c53",
              storageBucket: "herosjhessy-a4c53.firebasestorage.app",
              messagingSenderId: "824566132033",
              appId: "1:824566132033:web:03951b3c1e2f86bbbf05c0"
            };
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById("formulario");
        const mensagem = document.getElementById("mensagem");

        form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const cpf = document.getElementById("cpf").value;
        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;
        const telefone = document.getElementById("telefone").value;
        const senha = document.getElementById("senha").value;
        const cep = document.getElementById("cep").value;
        const idade = document.getElementById("idade").value;

        try {
            await addDoc(collection(db, "usuarios"), {
            cpf,
            nome,
            email,
            telefone,
            senha,
            cep,
            idade
            });

            mensagem.textContent = "Usuário salvo com sucesso.";
            mensagem.style.color = "green";
            form.reset();
        } catch (error) {
            mensagem.textContent = "Erro ao salvar: " + error.message;
            mensagem.style.color = "red";
        }
        });
</script>
</body>
</html>
