<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <style>
    input{
        margin: 10px;
    }
    fieldset{
        align-items: center;
        text-align: center;
        color: white;

    }
    legend{
        align-items: center;
        text-align: center;
        color: white;
    }
    body{
        background-color: rgb(70, 115, 199);
    }
    input{
        border-radius: 5px;
        border-color: white;
    }
</style>
        <script>
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
        getFirestore,
        collection,
        addDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            const firebaseConfig = {
              apiKey: "AIzaSyCfffba-K-xmsEc2F_nJb2fhgKNwljC0Jc",
              authDomain: "herosjhessy-a4c53.firebaseapp.com",
              projectId: "herosjhessy-a4c53",
              storageBucket: "herosjhessy-a4c53.firebasestorage.app",
              messagingSenderId: "824566132033",
              appId: "1:824566132033:web:03951b3c1e2f86bbbf05c0"
            };
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById("formulario");
        const mensagem = document.getElementById("mensagem");

        form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const cpf = document.getElementById("cpf").value;
        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;
        const telefone = document.getElementById("telefone").value;
        const senha = document.getElementById("senha").value;
        const cep = document.getElementById("cep").value;
        const idade = document.getElementById("idade").value;

        try {
            await addDoc(collection(db, "usuarios"), {
            cpf,
            nome,
            email,
            telefone,
            senha,
            cep,
            idade
            });

            mensagem.textContent = "Usuário salvo com sucesso.";
            mensagem.style.color = "green";
            form.reset();
        } catch (error) {
            mensagem.textContent = "Erro ao salvar: " + error.message;
            mensagem.style.color = "red";
        }
        });
</script>
</head>

<body>
    <main>
        <fieldset>
            <legend>Formulario de Cadastro</legend>
            <form id="formulario">
                <p>NOME:</p><input type="text" id="nome" class="campo" placeholder="Digite o seu nome" maxlength="100" minlength="5" required><br>
                <p>IDADE</p><input type="text" id="idade" class="campo" placeholder="Digite sua idade" maxlength="2" minlength="1" required><br>
                <p>EMAIL:</p><input type="text" id="email" class="campo" placeholder="Digite seu email" maxlength="50" minlength="10" required><br>
                <p>CPF:</p><input type="text" id="cpf" class="campo" placeholder="Digite seu cpf" maxlength="11" minlength="11" required><br>
                <p>SENHA:</p><input type="text" id="senha" class="campo" placeholder="Digite sua senha" maxlength="10" minlength="5" required><br>
                <p>TELEFONE:</p><input type="text" id="telefone" class="campo" placeholder="Digite seu telefone" maxlength="11" minlength="11" required><br>
                <p>CEP:</p><input type="text" id="cep" class="campo" placeholder="Digite seu cep" maxlength="12" minlength="10" required><br><br>
            </form>
        </fieldset>
    </main>

</body>
</html>
